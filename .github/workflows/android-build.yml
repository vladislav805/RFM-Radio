name: Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.14033849"

      - name: Build native assets
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14033849
        run: bash ./native/build.sh all

      - name: Build debug APK
        run: bash ./gradlew --no-daemon :app:assembleDebug

      - name: Print APK badging
        run: |
          APK_PATH="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "APK not found" >&2
            exit 1
          fi
          AAPT_PATH="${ANDROID_SDK_ROOT}/build-tools/34.0.0/aapt"
          if [[ ! -x "${AAPT_PATH}" ]]; then
            echo "aapt not found at ${AAPT_PATH}" >&2
            exit 1
          fi
          "${AAPT_PATH}" dump badging "${APK_PATH}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
