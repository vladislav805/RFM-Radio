name: Android Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.7.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;29.0.14033849"

      - name: Build native assets
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/29.0.14033849
        run: ./native/build.sh

      - name: Decode release keystore
        if: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "${ANDROID_RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/android-release.keystore"

      - name: Build release APK
        env:
          ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/android-release.keystore
          ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: bash ./gradlew --no-daemon :app:assembleRelease

      - name: Read app version
        id: app_version
        run: |
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="${{ github.event.inputs.version }}"
          fi
          if [[ -z "${VERSION_NAME}" ]]; then
            echo "Failed to resolve app version" >&2
            exit 1
          fi
          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=v${VERSION_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Publish draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag_name }}
          name: RFM Radio ${{ steps.app_version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: app/build/outputs/apk/release/*.apk
